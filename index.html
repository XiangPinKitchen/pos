<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>香品小食堂 點餐系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans TC',sans-serif; background:#f5f0e8; min-height:100vh; }

/* ── LAYOUT ── */
.app { display:flex; justify-content:center; }
.phone-wrap { width:100%; max-width:420px; min-height:100vh; background:#f5f0e8; position:relative; }
.page { display:none; }
.page.active { display:block; }

/* ── HEADER ── */
.header { background:#1a2455; color:white; padding:14px 16px 10px; position:sticky; top:0; z-index:100; }
.header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.logo-area { display:flex; align-items:center; gap:8px; }
.logo-circle { width:36px; height:36px; background:white; border-radius:50%; display:flex; align-items:center; justify-content:center; }
.shop-name { font-size:18px; font-weight:700; letter-spacing:1px; }
.cart-btn { position:relative; background:rgba(255,255,255,0.15); border:none; border-radius:20px; padding:6px 14px; color:white; cursor:pointer; font-size:14px; display:flex; align-items:center; gap:6px; font-family:'Noto Sans TC',sans-serif; }
.cart-btn:hover { background:rgba(255,255,255,0.25); }
.cart-badge { position:absolute; top:-4px; right:-4px; background:#e8a020; color:white; border-radius:10px; font-size:11px; font-weight:700; padding:1px 6px; min-width:18px; text-align:center; }
.cat-tabs { display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; padding-bottom:2px; }
.cat-tabs::-webkit-scrollbar { display:none; }
.cat-tab { flex-shrink:0; padding:4px 14px; border-radius:14px; border:none; font-size:13px; cursor:pointer; font-family:'Noto Sans TC',sans-serif; }
.cat-tab.active { background:#e8a020; color:white; font-weight:700; }
.cat-tab:not(.active) { background:rgba(255,255,255,0.15); color:rgba(255,255,255,0.85); }

/* ── ANNOUNCE ── */
.announce { background:#fef3d0; border-left:3px solid #e8a020; margin:12px 12px 0; border-radius:6px; padding:8px 12px; font-size:12px; color:#7a5200; }

/* ── SECTION TITLE ── */
.section-title { padding:14px 14px 6px; font-size:14px; font-weight:700; color:#1a2455; }

/* ── MENU LIST ── */
.menu-list { padding:0 10px 120px; display:flex; flex-direction:column; gap:8px; }
.menu-item { background:white; border-radius:12px; display:flex; align-items:center; padding:10px 12px; gap:12px; border:1.5px solid transparent; }
.menu-item.popular { border-color:#e8a020; }
.menu-item.unavailable { opacity:0.45; }
.item-emoji { width:56px; height:56px; border-radius:10px; background:#f5f0e8; display:flex; align-items:center; justify-content:center; font-size:30px; flex-shrink:0; }
.item-info { flex:1; }
.item-name-row { display:flex; align-items:center; gap:6px; margin-bottom:2px; flex-wrap:wrap; }
.item-name { font-size:15px; font-weight:700; color:#1a2455; }
.popular-tag { background:#fff3d0; color:#b87800; font-size:10px; font-weight:700; padding:1px 6px; border-radius:8px; }
.sold-tag { background:#ffe8e8; color:#c4390a; font-size:10px; font-weight:700; padding:1px 6px; border-radius:8px; }
.item-price { font-size:16px; font-weight:700; color:#c4390a; }
.add-btn { width:32px; height:32px; border-radius:50%; background:#1a2455; border:none; color:white; font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-family:'Noto Sans TC',sans-serif; }
.qty-control { display:flex; align-items:center; gap:6px; }
.qty-btn { width:28px; height:28px; border-radius:50%; border:1.5px solid #1a2455; background:white; color:#1a2455; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-family:'Noto Sans TC',sans-serif; }
.qty-btn.minus { color:#c4390a; border-color:#c4390a; }
.qty-num { font-size:16px; font-weight:700; color:#1a2455; min-width:20px; text-align:center; }

/* ── BOTTOM BAR ── */
.bottom-bar { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:420px; background:white; border-top:1px solid #e0e0e0; padding:8px 14px 14px; z-index:50; display:none; align-items:center; justify-content:space-between; }
.bottom-total { font-size:13px; color:#666; }
.bottom-total span { font-size:18px; font-weight:700; color:#c4390a; }
.bottom-order-btn { background:#1a2455; color:white; border:none; border-radius:10px; padding:10px 20px; font-size:15px; font-weight:700; cursor:pointer; font-family:'Noto Sans TC',sans-serif; }

/* ── OPTIONS MODAL ── */
.options-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; justify-content:flex-end; flex-direction:column; align-items:center; }
.options-overlay.open { display:flex; }
.options-sheet { background:white; border-radius:20px 20px 0 0; width:100%; max-width:420px; }
.options-header { padding:4px 16px 14px; border-bottom:1px solid #eee; }
.options-title { font-size:17px; font-weight:700; color:#1a2455; }
.options-price { font-size:14px; color:#c4390a; font-weight:700; margin-top:2px; }
.options-section { padding:14px 16px 0; }
.options-section-title { font-size:13px; font-weight:700; color:#888; margin-bottom:10px; }
.option-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid #f5f5f5; }
.option-label { font-size:15px; color:#333; }
.option-price-tag { font-size:13px; color:#c4390a; font-weight:700; margin-left:6px; }
.option-checkbox { width:22px; height:22px; accent-color:#1a2455; cursor:pointer; }
.sauce-btns { display:flex; gap:8px; flex-wrap:wrap; margin-top:4px; }
.sauce-btn { padding:7px 18px; border-radius:20px; border:1.5px solid #1a2455; background:white; color:#1a2455; font-size:14px; cursor:pointer; font-family:'Noto Sans TC',sans-serif; transition:all 0.15s; }
.sauce-btn.sel { background:#1a2455; color:white; font-weight:700; }

/* ── CART SHEET ── */
.cart-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; justify-content:flex-end; flex-direction:column; align-items:center; }
.cart-overlay.open { display:flex; }
.cart-sheet { background:white; border-radius:20px 20px 0 0; max-height:90vh; display:flex; flex-direction:column; width:100%; max-width:420px; }
.cart-handle { text-align:center; padding:10px; }
.cart-handle-bar { width:40px; height:4px; background:#ddd; border-radius:2px; display:inline-block; }
.cart-header { padding:0 16px 12px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #eee; }
.cart-title { font-size:18px; font-weight:700; color:#1a2455; }
.clear-btn { font-size:13px; color:#c4390a; background:none; border:none; cursor:pointer; padding:4px 8px; font-family:'Noto Sans TC',sans-serif; }
.cart-items { overflow-y:auto; padding:10px 16px; flex:1; }
.cart-item { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid #f0f0f0; }
.cart-item-name { flex:1; font-size:14px; font-weight:500; color:#1a2455; }
.cart-item-price { font-size:14px; font-weight:700; color:#c4390a; min-width:52px; text-align:right; }
.empty-cart { text-align:center; padding:30px; color:#aaa; font-size:14px; }
.cart-options { padding:12px 16px; border-top:1px solid #eee; }
.opt-title { font-size:13px; font-weight:700; color:#555; margin-bottom:10px; }
.opt-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.opt-label { font-size:14px; color:#333; }
.opt-toggle { display:flex; border:1.5px solid #1a2455; border-radius:8px; overflow:hidden; }
.opt-toggle button { padding:4px 12px; border:none; font-size:13px; cursor:pointer; font-family:'Noto Sans TC',sans-serif; background:white; color:#1a2455; }
.opt-toggle button.sel { background:#1a2455; color:white; font-weight:700; }
.note-input { width:100%; border:1.5px solid #e0e0e0; border-radius:8px; padding:8px 10px; font-size:13px; font-family:'Noto Sans TC',sans-serif; color:#333; resize:none; margin-top:4px; }
.note-input:focus { outline:none; border-color:#1a2455; }
.cart-summary { padding:10px 16px; background:#f9f9f9; border-top:1px solid #eee; }
.summary-row { display:flex; justify-content:space-between; font-size:13px; color:#666; margin-bottom:4px; }
.summary-total { display:flex; justify-content:space-between; font-size:18px; font-weight:700; color:#1a2455; margin-top:8px; }
.checkout-btn { margin:12px 16px 20px; background:#1a2455; color:white; border:none; border-radius:12px; padding:14px; font-size:16px; font-weight:700; cursor:pointer; width:calc(100% - 32px); font-family:'Noto Sans TC',sans-serif; }
.checkout-btn:disabled { background:#aaa; cursor:not-allowed; }

/* ── SUCCESS MODAL ── */
.success-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:300; align-items:center; justify-content:center; }
.success-overlay.open { display:flex; }
.success-card { background:white; border-radius:20px; padding:32px 24px; text-align:center; max-width:300px; width:90%; }
.success-icon { font-size:56px; margin-bottom:12px; }
.success-title { font-size:22px; font-weight:700; color:#1a2455; margin-bottom:6px; }
.success-close { background:#1a2455; color:white; border:none; border-radius:10px; padding:12px 32px; font-size:15px; font-weight:700; cursor:pointer; font-family:'Noto Sans TC',sans-serif; }

/* ══════════════════════════════
   ADMIN PANEL
══════════════════════════════ */
.login-card { background:white; border-radius:20px; padding:36px 28px; width:90%; max-width:340px; text-align:center; }
.login-logo { font-size:48px; margin-bottom:8px; }
.login-title { font-size:20px; font-weight:700; color:#1a2455; margin-bottom:4px; }
.login-sub { font-size:13px; color:#888; margin-bottom:24px; }
.login-input { width:100%; border:1.5px solid #ddd; border-radius:10px; padding:10px 14px; font-size:15px; font-family:'Noto Sans TC',sans-serif; margin-bottom:12px; }
.login-input:focus { outline:none; border-color:#1a2455; }
.login-btn { width:100%; background:#1a2455; color:white; border:none; border-radius:10px; padding:12px; font-size:15px; font-weight:700; cursor:pointer; font-family:'Noto Sans TC',sans-serif; }

/* Admin layout */
.admin-wrap { display:none; min-height:100vh; background:#f0ede6; }
.admin-wrap.active { display:block; }
.admin-header { background:#1a2455; color:white; padding:14px 16px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.admin-title { font-size:17px; font-weight:700; }
.admin-back-btn { background:rgba(255,255,255,0.15); border:none; color:white; border-radius:8px; padding:6px 14px; font-size:13px; cursor:pointer; font-family:'Noto Sans TC',sans-serif; }

/* Admin tabs */
.admin-tabs { display:flex; background:#1a2455; padding:0 16px 12px; gap:8px; }
.admin-tab { flex:1; padding:8px 4px; border:none; border-radius:10px; font-size:13px; font-weight:700; cursor:pointer; font-family:'Noto Sans TC',sans-serif; }
.admin-tab.active { background:#e8a020; color:white; }
.admin-tab:not(.active) { background:rgba(255,255,255,0.15); color:rgba(255,255,255,0.8); }

.admin-content { padding:14px; display:none; }
.admin-content.active { display:block; }

/* Menu admin */
.menu-admin-item { background:white; border-radius:12px; padding:12px 14px; margin-bottom:8px; display:flex; align-items:center; gap:12px; }
.menu-admin-emoji { font-size:28px; width:44px; text-align:center; flex-shrink:0; }
.menu-admin-info { flex:1; }
.menu-admin-name { font-size:14px; font-weight:700; color:#1a2455; }
.menu-admin-price { font-size:13px; color:#c4390a; font-weight:700; }
.menu-admin-actions { display:flex; flex-direction:column; gap:6px; align-items:flex-end; }
.toggle-popular { padding:4px 10px; border-radius:8px; border:none; font-size:12px; font-weight:700; cursor:pointer; font-family:'Noto Sans TC',sans-serif; background:#f5f0e8; color:#888; }
.toggle-popular.on { background:#fff3d0; color:#b87800; }
.toggle-avail { padding:4px 10px; border-radius:8px; border:none; font-size:12px; font-weight:700; cursor:pointer; font-family:'Noto Sans TC',sans-serif; }
.toggle-avail.on { background:#e6f9ee; color:#1a7a3e; }
.toggle-avail.off { background:#ffe8e8; color:#c4390a; }
.edit-price-btn { padding:4px 10px; border-radius:8px; border:1.5px solid #1a2455; font-size:12px; color:#1a2455; background:white; cursor:pointer; font-family:'Noto Sans TC',sans-serif; }

/* Edit price modal */
.edit-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:400; align-items:center; justify-content:center; }
.edit-overlay.open { display:flex; }
.edit-card { background:white; border-radius:16px; padding:24px 20px; width:80%; max-width:280px; }
.edit-title { font-size:16px; font-weight:700; color:#1a2455; margin-bottom:16px; }
.edit-input { width:100%; border:1.5px solid #ddd; border-radius:8px; padding:10px 14px; font-size:16px; font-family:'Noto Sans TC',sans-serif; margin-bottom:14px; }
.edit-input:focus { outline:none; border-color:#1a2455; }
.edit-btns { display:flex; gap:8px; }
.edit-save { flex:1; background:#1a2455; color:white; border:none; border-radius:8px; padding:10px; font-size:14px; font-weight:700; cursor:pointer; font-family:'Noto Sans TC',sans-serif; }
.edit-cancel-btn { flex:1; background:#f0ede6; color:#555; border:none; border-radius:8px; padding:10px; font-size:14px; cursor:pointer; font-family:'Noto Sans TC',sans-serif; }

/* Announce edit */
.announce-edit-card { background:white; border-radius:12px; padding:16px; margin-bottom:12px; }
.announce-textarea { width:100%; border:1.5px solid #ddd; border-radius:8px; padding:10px; font-size:14px; font-family:'Noto Sans TC',sans-serif; resize:none; }
.announce-textarea:focus { outline:none; border-color:#1a2455; }
.announce-save-btn { background:#1a2455; color:white; border:none; border-radius:8px; padding:10px 24px; font-size:14px; font-weight:700; cursor:pointer; font-family:'Noto Sans TC',sans-serif; margin-top:10px; }
.section-label { font-size:13px; font-weight:700; color:#888; margin:16px 0 8px; text-transform:uppercase; letter-spacing:0.5px; }

/* Admin nav link */
.admin-link { text-align:center; padding:16px; }
.admin-link a { font-size:13px; color:#888; text-decoration:none; }

/* Add item */
.add-item-card { background:white; border-radius:12px; padding:14px 16px; margin-bottom:8px; }
.add-item-row { display:flex; gap:8px; margin-bottom:8px; }
.add-item-input { flex:1; border:1.5px solid #ddd; border-radius:8px; padding:8px 10px; font-size:14px; font-family:'Noto Sans TC',sans-serif; }
.add-item-input:focus { outline:none; border-color:#1a2455; }
</style>
</head>
<body>
<div class="app">

<!-- ══════════════════════
     CUSTOMER ORDERING PAGE
══════════════════════ -->
<div class="phone-wrap page active" id="page-order">

  <div class="header">
    <div class="header-top">
      <div class="logo-area">
        <div class="logo-circle">
          <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" width="22" height="22">
            <circle cx="50" cy="50" r="48" fill="#1a2455"/>
            <path d="M25 62 Q50 70 75 62 L73 74 Q50 80 27 74 Z" fill="white"/>
            <path d="M32 62 Q50 55 68 62" stroke="white" stroke-width="3" fill="none"/>
            <rect x="44" y="20" width="4" height="30" rx="2" fill="white" transform="rotate(-15 46 35)"/>
            <rect x="52" y="18" width="4" height="28" rx="2" fill="white" transform="rotate(10 54 32)"/>
            <circle cx="36" cy="42" r="3" fill="white" opacity="0.6"/>
            <circle cx="41" cy="36" r="2" fill="white" opacity="0.4"/>
          </svg>
        </div>
        <span class="shop-name">香品小食堂</span>
      </div>
      <button class="cart-btn" onclick="openCart()">
        🛒 購物車
        <span class="cart-badge" id="cart-badge" style="display:none">0</span>
      </button>
    </div>
    <div class="cat-tabs" id="cat-tabs"></div>
  </div>

  <div class="announce" id="announce-bar">📢 今日特餐：麻醬麵 $65，限量供應！外帶九折優惠中</div>

  <div id="menu-content"></div>

  <div class="bottom-bar" id="bottom-bar">
    <div class="bottom-total">已選 <span id="bottom-price">$0</span></div>
    <button class="bottom-order-btn" onclick="openCart()">查看訂單</button>
  </div>

  <div class="admin-link"><a href="#" onclick="showAdminLogin()">⚙️ 後台管理</a></div>
</div>

<!-- Cart Sheet -->
<div class="cart-overlay" id="cart-overlay" onclick="overlayClick(event)">
  <div class="cart-sheet">
    <div class="cart-handle"><span class="cart-handle-bar"></span></div>
    <div class="cart-header">
      <span class="cart-title">我的訂單</span>
      <button class="clear-btn" onclick="clearCart()">清空</button>
    </div>
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-options">
      <div class="opt-title">訂單選項</div>
      <div class="opt-row">
        <span class="opt-label">💴 付款方式</span>
        <span style="font-size:14px;font-weight:700;color:#1a2455;">現金</span>
      </div>
      <div class="opt-row">
        <span class="opt-label">🥢 免洗餐具</span>
        <div class="opt-toggle">
          <button onclick="selOpt('cutlery','yes',this)">需要</button>
          <button class="sel" onclick="selOpt('cutlery','no',this)">不需要</button>
        </div>
      </div>
      <div class="opt-row">
        <span class="opt-label">🧾 收據</span>
        <div class="opt-toggle">
          <button onclick="selOpt('receipt','yes',this)">需要</button>
          <button class="sel" onclick="selOpt('receipt','no',this)">不需要</button>
        </div>
      </div>
      <div style="margin-top:8px">
        <div style="font-size:13px;color:#666;margin-bottom:4px;">📝 備註（過敏、口味調整...）</div>
        <textarea class="note-input" rows="2" placeholder="例：不要香菜、少辣..." id="order-note"></textarea>
      </div>
    </div>
    <div class="cart-summary">
      <div class="summary-row"><span>小計</span><span id="sum-sub">$0</span></div>
      <div class="summary-total"><span>合計</span><span id="sum-total">$0</span></div>
    </div>
    <button class="checkout-btn" id="checkout-btn" onclick="placeOrder()">確認下單</button>
  </div>
</div>

<!-- Success Modal（非 LINE 環境備用）-->
<div class="success-overlay" id="success-overlay">
  <div class="success-card">
    <div class="success-icon">🎉</div>
    <div class="success-title">下單成功！</div>
    <div style="font-size:13px;color:#888;margin-bottom:20px">請稍候，我們正在為您準備</div>
    <button class="success-close" onclick="closeSuccess()">好的，謝謝</button>
  </div>
</div>

<!-- ══════════════════════
     ADMIN LOGIN
══════════════════════ -->
<div class="page" id="page-admin-login" style="min-height:100vh;background:#1a2455;display:none;align-items:center;justify-content:center;">
  <div class="login-card">
    <div class="login-logo">🔐</div>
    <div class="login-title">後台管理</div>
    <div class="login-sub">香品小食堂</div>
    <input class="login-input" type="text" id="login-user" placeholder="帳號" />
    <input class="login-input" type="password" id="login-pass" placeholder="密碼" onkeydown="if(event.key==='Enter')doLogin()" />
    <button class="login-btn" onclick="doLogin()">登入</button>

    <div style="margin-top:12px"><a href="#" onclick="showPage('page-order')" style="font-size:13px;color:#aaa;text-decoration:none;">← 返回點餐</a></div>
  </div>
</div>

<!-- ══════════════════════
     ADMIN PANEL
══════════════════════ -->
<div class="admin-wrap" id="admin-wrap">
  <div class="admin-header">
    <span class="admin-title">⚙️ 後台管理</span>
    <button class="admin-back-btn" onclick="adminLogout()">登出</button>
  </div>
  <div class="admin-tabs">
    <button class="admin-tab active" onclick="switchAdminTab('menu',this)">🍜 菜單</button>
    <button class="admin-tab" onclick="switchAdminTab('settings',this)">🔧 設定</button>
  </div>

  <!-- Menu management -->
  <div class="admin-content active" id="tab-menu" style="padding:14px;">
    <!-- 新增品項 -->
    <div class="add-item-card">
      <div class="section-label" style="margin-top:0;">新增品項</div>
      <div class="add-item-row">
        <input class="add-item-input" id="new-name" placeholder="品項名稱" />
        <input class="add-item-input" id="new-price" type="number" placeholder="價格" style="width:90px;" />
      </div>
      <div class="add-item-row">
        <select class="add-item-input" id="new-cat">
          <option value="">選擇分類</option>
          <option>炒飯</option><option>炒麵</option><option>炒烏龍麵</option>
          <option>烏龍湯麵</option><option>粥品</option><option>熱炒類</option>

function showPage(id) {
  ['page-order','page-admin-login'].forEach(p=>{
    const el=document.getElementById(p);
    if(el){ el.style.display='none'; el.classList.remove('active'); }
  });
  document.getElementById('admin-wrap').classList.remove('active');
  const target=document.getElementById(id);
  if(id==='page-admin-login'){
    target.style.display='flex';
  } else if(id==='admin-wrap'){
    document.getElementById('admin-wrap').classList.add('active');
  } else {
    target.style.display='block';
    target.classList.add('active');
  }
}

function showAdminLogin(){ showPage('page-admin-login'); }

function doLogin(){
  const u=document.getElementById('login-user').value;
  const p=document.getElementById('login-pass').value;
  if(u==='233009'&&p===adminPass){
    showPage('admin-wrap');
    renderAdminMenu();
    document.getElementById('announce-input').value=announceText;
  } else {
    alert('帳號或密碼錯誤！');
  }
}

function adminLogout(){
  document.getElementById('login-user').value='';
  document.getElementById('login-pass').value='';
  showPage('page-order');
}

  items.forEach(i=>{ if(!byCat[i.cat]) byCat[i.cat]=[]; byCat[i.cat].push(i); });
  let html='<div class="menu-list">';
  if(selCat!=='全部'){
    if(items.length===0){
      html+='<div style="text-align:center;padding:40px 20px;color:#aaa;font-size:14px;">此分類尚無品項</div>';
    } else {
      html+=items.map(renderItem).join('');
    }
  } else {
    ALL_CATS.filter(c=>c!=='全部').forEach(cat=>{
      const catItems=byCat[cat]||[];
      html+=`<div class="section-title">${cat}</div>`;
      if(catItems.length===0){
        html+='<div style="padding:8px 14px 4px;font-size:13px;color:#bbb;">尚無品項</div>';
      } else {
        html+=catItems.map(renderItem).join('');
      }
    });
  }
  html+='</div>';
  document.getElementById('menu-content').innerHTML=html;
}

function renderItem(item){
  const q=cart[item.id]||0;
  let ctrl='';
  if(!item.available){
    ctrl='<span class="sold-tag">售完</span>';
  } else if(q>0){
    ctrl=`<div class="qty-control">
      <button class="qty-btn minus" onclick="changeQty(${item.id},-1)">−</button>
      <span class="qty-num">${q}</span>
      <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
    </div>`;
  } else {
    ctrl=`<button class="add-btn" onclick="changeQty(${item.id},1)">+</button>`;
  }
  return `<div class="menu-item${item.popular?' popular':''}${!item.available?' unavailable':''}">
    <div class="item-emoji">${item.emoji}</div>
    <div class="item-info">
      <div class="item-name-row">
        <span class="item-name">${item.name}</span>
        ${item.popular?'<span class="popular-tag">熱銷</span>':''}
        ${!item.available?'<span class="sold-tag">售完</span>':''}
      </div>
      <div class="item-price">$${item.price}</div>
    </div>
    ${item.available?ctrl:''}
  </div>`;
}

let pendingItem = null;
let pendingExtras = {};
let pendingSauce = null;

function changeQty(id,delta){
  if(delta > 0){
    const item = menu.find(i=>i.id===id);
    if(item && ((item.extras && item.extras.length>0) || (item.sauce && item.sauce.length>0))){
      openOptionsModal(item);
      return;
    }
  }
  const cur=cart[id]||0;
  const next=cur+delta;
  if(next<=0) delete cart[id]; else cart[id]=next;
  renderMenu();
  updateBadge();
  updateBottomBar();
}

function openOptionsModal(item){
  pendingItem = item;
  pendingExtras = {};
  pendingSauce = item.sauce && item.sauce.length>0 ? item.sauce[0] : null;

  document.getElementById('options-header').innerHTML = `
    <div class="options-title">${item.emoji} ${item.name}</div>
    <div class="options-price">$${item.price}</div>
  `;

  let body = '';

  if(item.extras && item.extras.length>0){
    body += '<div class="options-section"><div class="options-section-title">加購選項</div>';
    item.extras.forEach((ex,i)=>{
      const priceTag = ex.price>0 ? `<span class="option-price-tag">+$${ex.price}</span>` : '<span class="option-price-tag" style="color:#888">免費</span>';
      body += `<div class="option-row">
        <span class="option-label">${ex.label}${priceTag}</span>
        <input type="checkbox" class="option-checkbox" id="ex-${i}" onchange="toggleExtra(${i})">
      </div>`;
    });
    body += '</div>';
  }

  if(item.sauce && item.sauce.length>0){
    body += '<div class="options-section" style="padding-bottom:14px;"><div class="options-section-title">醬料選擇</div><div class="sauce-btns">';
    item.sauce.forEach((s,i)=>{
      body += `<button class="sauce-btn${i===0?' sel':''}" onclick="selSauce('${s}',this)">${s}</button>`;
    });
    body += '</div></div>';
  }

  document.getElementById('options-body').innerHTML = body;
  document.getElementById('options-overlay').classList.add('open');
}

function toggleExtra(i){
  pendingExtras[i] = document.getElementById('ex-'+i).checked;
}

function selSauce(s, btn){
  pendingSauce = s;
  btn.closest('.sauce-btns').querySelectorAll('.sauce-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
}

function optionsOverlayClick(e){
  if(e.target===document.getElementById('options-overlay')) closeOptionsModal();
}

function closeOptionsModal(){
  document.getElementById('options-overlay').classList.remove('open');
  pendingItem = null;
}

function confirmAddToCart(){
  if(!pendingItem) return;
  const id = pendingItem.id;

  // Build note from selections
  let notes = [];
  if(pendingItem.extras){
    pendingItem.extras.forEach((ex,i)=>{
      if(pendingExtras[i]) notes.push(ex.label);
    });
  }
  if(pendingSauce) notes.push(pendingSauce);

  // Extra price
  let extraPrice = 0;
  if(pendingItem.extras){
    pendingItem.extras.forEach((ex,i)=>{
      if(pendingExtras[i]) extraPrice += ex.price;
    });
  }

  // Store as cart entry with note
  const key = id + (notes.length>0 ? '__'+notes.join('_') : '');
  if(!cart[key]) cart[key] = {itemId:id, qty:0, notes:notes.join('、'), extraPrice};
  cart[key].qty += 1;

  closeOptionsModal();
  renderMenu();
  updateBadge();
  updateBottomBar();
}

function updateBadge(){
  const total=Object.values(cart).reduce((a,b)=>typeof b==='object'?a+b.qty:a+b,0);
  const badge=document.getElementById('cart-badge');
  badge.textContent=total;
  badge.style.display=total>0?'block':'none';
}

function updateBottomBar(){
  const sub=calcSub();
  const bar=document.getElementById('bottom-bar');
  if(sub>0){
    bar.style.display='flex';
    document.getElementById('bottom-price').textContent='$'+calcTotal();
  } else { bar.style.display='none'; }
}

function calcSub(){
  return Object.entries(cart).reduce((s,[key,val])=>{
    if(typeof val==='object'){
      const item=menu.find(i=>i.id===val.itemId);
      return s+(item?(item.price+val.extraPrice)*val.qty:0);
    } else {
      const item=menu.find(i=>i.id==key);
      return s+(item?item.price*val:0);
    }
  },0);
}

function calcTotal(){
  return calcSub();
}

// ══════════════════════════════
//  CART
// ══════════════════════════════
function openCart(){
  renderCartItems();
  updateSummary();
  document.getElementById('cart-overlay').classList.add('open');
}

function overlayClick(e){
  if(e.target===document.getElementById('cart-overlay')) closeCart();
}

function closeCart(){ document.getElementById('cart-overlay').classList.remove('open'); }

function clearCart(){
  if(Object.keys(cart).length===0) return;
  cart={};
  renderCartItems(); updateBadge(); updateBottomBar(); updateSummary();
}

function renderCartItems(){
  const el=document.getElementById('cart-items');
  const keys=Object.keys(cart);
  if(keys.length===0){
    el.innerHTML='<div class="empty-cart">🍜<br>還沒有選任何品項</div>';
    document.getElementById('checkout-btn').disabled=true;
    return;
  }
  document.getElementById('checkout-btn').disabled=false;
  el.innerHTML=keys.map(key=>{
    const val=cart[key];
    if(typeof val==='object'){
      const item=menu.find(i=>i.id===val.itemId);
      const unitPrice=item.price+val.extraPrice;
      return `<div class="cart-item">
        <div class="qty-control">
          <button class="qty-btn minus" onclick="changeCartQtyKey('${key}',-1)">−</button>
          <span class="qty-num">${val.qty}</span>
          <button class="qty-btn" onclick="changeCartQtyKey('${key}',1)">+</button>
        </div>
        <div style="flex:1">
          <div class="cart-item-name">${item.emoji} ${item.name}</div>
          ${val.notes?`<div style="font-size:11px;color:#888;">${val.notes}</div>`:''}
        </div>
        <span class="cart-item-price">$${unitPrice*val.qty}</span>
      </div>`;
    } else {
      const item=menu.find(i=>i.id==key);
      return `<div class="cart-item">
        <div class="qty-control">
          <button class="qty-btn minus" onclick="changeCartQtyKey('${key}',-1)">−</button>
          <span class="qty-num">${val}</span>
          <button class="qty-btn" onclick="changeCartQtyKey('${key}',1)">+</button>
        </div>
        <span class="cart-item-name">${item.emoji} ${item.name}</span>
        <span class="cart-item-price">$${item.price*val}</span>
      </div>`;
    }
  }).join('');
}

function changeCartQtyKey(key, delta){
  const val = cart[key];
  if(typeof val==='object'){
    val.qty += delta;
    if(val.qty <= 0) delete cart[key];
  } else {
    const next = val + delta;
    if(next <= 0) delete cart[key]; else cart[key] = next;
  }
  renderCartItems();
  updateBadge();
  updateBottomBar();
  updateSummary();
}

function selOpt(key,val,btn){
  opts[key]=val;
  const parent=btn.parentElement;
  parent.querySelectorAll('button').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  updateSummary();
}

function updateSummary(){
  const sub=calcSub();
  document.getElementById('sum-sub').textContent='$'+sub;
  document.getElementById('sum-total').textContent='$'+sub;
  const bp=document.getElementById('bottom-price');
  if(bp) bp.textContent='$'+sub;
}

function placeOrder(){
  if(Object.keys(cart).length===0) return;
  const items=Object.entries(cart).map(([key,val])=>{
    if(typeof val==='object'){
      const item=menu.find(i=>i.id===val.itemId);
      return {name:item.name+(val.notes?' ('+val.notes+')':''),qty:val.qty,price:item.price+val.extraPrice,emoji:item.emoji};
    } else {
      const item=menu.find(i=>i.id==key);
      return {name:item.name,qty:val,price:item.price,emoji:item.emoji};
    }
  });
  const now=new Date();
  const timeStr=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  const note=document.getElementById('order-note').value;
  const total=calcSub();
  const cutlery=opts.cutlery==='yes'?'需要':'不需要';
  const receipt=opts.receipt==='yes'?'需要':'不需要';

  const lines=[
    '【香品小食堂 點餐】',
    `時間：${timeStr}`,
    '────────────────',
    ...items.map(i=>`${i.emoji} ${i.name} ×${i.qty}　$${i.price*i.qty}`),
    '────────────────',
    `合計：$${total}`,
    `免洗餐具：${cutlery}`,
    `收據：${receipt}`,
    ...(note?[`備註：${note}`]:[]),
  ];
  const msgText=lines.join('\n');

  cart={};
  updateBadge(); updateBottomBar(); closeCart();
  document.getElementById('order-note').value='';

  const inLine = typeof liff !== 'undefined' && liff.isInClient && liff.isInClient();
  if(inLine){
    liff.sendMessages([{type:'text', text:msgText}])
      .then(()=>{ alert('訂單已送出！'); liff.closeWindow(); })
      .catch(err=>{
        console.error('sendMessages error:', err);
        alert('訊息傳送失敗，請截圖後手動傳送。');
        document.getElementById('success-overlay').classList.add('open');
      });
  } else {
    window.location.href='https://line.me/R/share?text='+encodeURIComponent(msgText);
  }
}

function closeSuccess(){
  document.getElementById('success-overlay').classList.remove('open');
  renderMenu();
}

// ══════════════════════════════
//  ADMIN TABS
// ══════════════════════════════
function switchAdminTab(tab,btn){
  document.querySelectorAll('.admin-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.admin-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='menu') renderAdminMenu();
}

// ══════════════════════════════
//  ADMIN MENU
// ══════════════════════════════
function renderAdminMenu(){
  document.getElementById('admin-menu-list').innerHTML=menu.map(item=>`
    <div class="menu-admin-item">
      <div class="menu-admin-emoji">${item.emoji}</div>
      <div class="menu-admin-info">
        <div class="menu-admin-name">${item.name}</div>
        <div class="menu-admin-price">$${item.price}</div>
      </div>
      <div class="menu-admin-actions">
        <button class="toggle-popular ${item.popular?'on':''}" onclick="togglePopular(${item.id})" title="熱銷推薦">
          ${item.popular?'⭐ 熱銷':'☆ 熱銷'}
        </button>
        <button class="toggle-avail ${item.available?'on':'off'}" onclick="toggleAvail(${item.id})">
          ${item.available?'✓ 供應中':'✕ 售完'}
        </button>
        <button class="edit-price-btn" onclick="openEditModal(${item.id})">改價格</button>
      </div>
    </div>
  `).join('');
}

function togglePopular(id){
  const item=menu.find(i=>i.id===id);
  if(item){ item.popular=!item.popular; renderAdminMenu(); renderMenu(); }
}

function toggleAvail(id){
  const item=menu.find(i=>i.id===id);
  if(item){ item.available=!item.available; renderAdminMenu(); renderMenu(); }
}

let nextId = 200;
function addMenuItem(){
  const name=document.getElementById('new-name').value.trim();
  const price=parseInt(document.getElementById('new-price').value);
  const cat=document.getElementById('new-cat').value;
  const emoji=document.getElementById('new-emoji').value.trim()||'🍽️';
  if(!name){ alert('請輸入品項名稱'); return; }
  if(!cat){ alert('請選擇分類'); return; }
  if(isNaN(price)||price<0){ alert('請輸入有效價格'); return; }
  menu.push({id:nextId++, cat, name, price, emoji, popular:false, available:true, extras:[{label:"加辣🌶️",price:0}], sauce:[]});
  document.getElementById('new-name').value='';
  document.getElementById('new-price').value='';
  document.getElementById('new-emoji').value='';
  document.getElementById('new-cat').value='';
  renderAdminMenu();
  renderMenu();
}

function openEditModal(id){
  editingItemId=id;
  const item=menu.find(i=>i.id===id);
  document.getElementById('edit-item-name').textContent='修改：'+item.name;
  document.getElementById('edit-price-input').value=item.price;
  document.getElementById('edit-overlay').classList.add('open');
}

function closeEditModal(){
  document.getElementById('edit-overlay').classList.remove('open');
  editingItemId=null;
}

function savePrice(){
  const newPrice=parseInt(document.getElementById('edit-price-input').value);
  if(isNaN(newPrice)||newPrice<0){ alert('請輸入有效價格'); return; }
  const item=menu.find(i=>i.id===editingItemId);
  if(item){ item.price=newPrice; }
  closeEditModal();
  renderAdminMenu();
  renderMenu();
}

// ══════════════════════════════
//  SETTINGS
// ══════════════════════════════
function saveAnnounce(){
  announceText=document.getElementById('announce-input').value;
  document.getElementById('announce-bar').textContent=announceText;
  alert('公告已更新！');
}

function changePass(){
  const np=document.getElementById('new-pass').value;
  if(!np){ alert('請輸入新密碼'); return; }
  adminPass=np;
  document.getElementById('new-pass').value='';
  alert('密碼已更新！');
}
